---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: 'default'
  importDerivedRoles: [apcrda_derived]
  resource: document
  rules:
    # Officials in same district can upload documents on non-terminal bonds
    - actions: [upload, delete]
      derivedRoles: [same_district_official]
      condition:
        match:
          expr: >
            request.resource.attr.status != "ACTIVE"
            && request.resource.attr.status != "REJECTED"
            && request.resource.attr.status != "REVOKED"
      effect: EFFECT_ALLOW

    # View documents on bonds user can access
    - actions: [view, download]
      derivedRoles: [same_district_official]
      effect: EFFECT_ALLOW

    - actions: [view, download]
      roles: [COMMISSIONER, ADDL_COMMISSIONER]
      effect: EFFECT_ALLOW

    - actions: [view, download]
      derivedRoles: [bond_owner_farmer]
      effect: EFFECT_ALLOW
