---
# Default decision is DENY — never add catch-all `roles: ['*']` EFFECT_DENY rules;
# they override explicit ALLOW rules (Cerbos deny-wins semantics).
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: 'default'
  importDerivedRoles: [apcrda_derived]
  resource: bond
  rules:
    - actions: [view]
      derivedRoles: [same_district_official]
      effect: EFFECT_ALLOW

    - actions: [view]
      roles: [COMMISSIONER, ADDL_COMMISSIONER]
      effect: EFFECT_ALLOW

    - actions: [view]
      derivedRoles: [bond_owner_farmer]
      effect: EFFECT_ALLOW

    - actions: [revoke]
      roles: [COMMISSIONER]
      condition:
        match:
          expr: request.resource.attr.status == "ACTIVE"
      effect: EFFECT_ALLOW
