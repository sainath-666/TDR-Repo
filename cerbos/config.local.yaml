# Local Cerbos config (Windows/WSL — paths relative to cerbos/ directory)
server:
  httpListenAddr: ':3592'
  grpcListenAddr: ':3593'

storage:
  driver: disk
  disk:
    directory: ./policies
    watchForChanges: true

audit:
  enabled: true
  accessLogsEnabled: true
  decisionLogsEnabled: true
  backend: local
  local:
    storagePath: ./cerbos_logs
    retentionPeriod: 168h
