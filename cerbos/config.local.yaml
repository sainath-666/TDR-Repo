# Local Cerbos — run from repo root: npm run cerbos:start
# Paths are relative to the project root (where you start the server).

server:
  httpListenAddr: ':3592'
  grpcListenAddr: ':3593'

storage:
  driver: disk
  disk:
    directory: cerbos/policies
    watchForChanges: true

audit:
  enabled: true
  accessLogsEnabled: true
  decisionLogsEnabled: true
  backend: local
  local:
    storagePath: cerbos_logs
    retentionPeriod: 168h
