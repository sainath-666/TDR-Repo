# Host nginx — TDR app (HTTP by IP + HTTPS by domain)
# Install: sudo cp deploy/nginx/tdr-host.conf /etc/nginx/sites-available/tdr
#          sudo ln -sf /etc/nginx/sites-available/tdr /etc/nginx/sites-enabled/tdr
#          sudo nginx -t && sudo systemctl reload nginx

# Direct IP / catch-all HTTP (no TLS on raw IP)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 52.140.48.93 _;

    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# TDR portal domain — redirect HTTP to HTTPS
server {
    listen 80;
    server_name tdr.4sightview.com;

    return 301 https://$host$request_uri;
}

# TDR portal domain — HTTPS (use same wildcard cert as other *.4sightview.com services)
server {
    listen 443 ssl http2;
    server_name tdr.4sightview.com;

    ssl_certificate     /etc/nginx/ssl/keycloak.crt;
    ssl_certificate_key /etc/nginx/ssl/keycloak.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}
