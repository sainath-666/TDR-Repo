services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-apcrda_tdr}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-apcrda_tdr}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apcrda-internal

  app:
    build: .
    ports:
      - '3000:3000'
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-apcrda_tdr}
      CERBOS_PDP_URL: cerbos:3593
      CERBOS_MOCK_MODE: 'false'
      IPFS_API_URL: http://ipfs:5001
    depends_on:
      postgres:
        condition: service_healthy
      cerbos:
        condition: service_healthy
    networks:
      - apcrda-internal

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.38.0
    command: server --config=/config.yaml
    volumes:
      - ./cerbos/policies:/policies
      - ./cerbos/config.yaml:/config.yaml
      - cerbos_logs:/var/log/cerbos
    ports:
      - '3592:3592'
      - '3593:3593'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3592/_cerbos/health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - apcrda-internal

  ipfs:
    image: ipfs/kubo:v0.32.1
    ports:
      - '5001:5001'
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - apcrda-internal

volumes:
  postgres_data:
  cerbos_logs:
  ipfs_data:

networks:
  apcrda-internal:
    driver: bridge
